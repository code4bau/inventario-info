<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de IPs{% endblock %}</title>

    <!-- Favicon -->
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'img/logoPestañaIps.png' %}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <nav class="navbar" style="border-bottom: 2px solid var(--accent);">
        <div class="navbar-brand" style="display: flex; align-items: center; gap: 0.5rem;">
            <img src="{% static 'img/logoPestañaIps.png' %}" alt="Logo IPs FOLP"
                style="width: 24px; height: 24px; filter: brightness(0) invert(1);">
            <div>Gestión de IPs</div>
        </div>
        <div class="nav-links">
            <a href="{% url 'ip_list' %}"
                class="{% if request.resolver_match.url_name == 'ip_list' %}active{% endif %}">Lista de IPs</a>
            <a href="{% url 'ip_create' %}"
                class="{% if request.resolver_match.url_name == 'ip_create' %}active{% endif %}">Nueva IP</a>
            <a href="{% url 'dashboard' %}" style="opacity: 0.8; margin-left: 20px;">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px; vertical-align: text-bottom;"></i> Volver
                a Inventario
            </a>
            
            <div class="user-menu">
                <button class="user-menu-btn" onclick="toggleUserMenu(event)">
                    <i data-lucide="user"></i>
                </button>
                <div id="userDropdown" class="dropdown-content">
                    <a href="/admin/">
                        <i data-lucide="settings" style="width: 14px; height: 14px; margin-right: 8px;"></i> Panel Admin
                    </a>
                    <div class="dropdown-divider"></div>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit">
                            <i data-lucide="log-out" style="width: 14px; height: 14px; margin-right: 8px;"></i> Salir
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="container animate-fade">
        {% if messages %}
        {% for message in messages %}
        <div class="card" style="margin-bottom: 1rem; border-left: 4px solid var(--primary)">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        function toggleUserMenu(event) {
            event.stopPropagation();
            document.getElementById("userDropdown").classList.toggle("show");
        }

        // Close dropdown when clicking outside
        window.onclick = function(event) {
            if (!event.target.matches('.user-menu-btn') && !event.target.closest('.user-menu-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
