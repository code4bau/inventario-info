<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de IPs{% endblock %} | FOLP</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar" style="border-bottom: 2px solid var(--accent);">
        <div class="navbar-brand">
            <span style="color: var(--accent)">●</span> Gestión de IPs <span style="font-weight: 300">FOLP</span>
        </div>
        <div class="nav-links">
            <a href="{% url 'ip_list' %}" class="{% if request.resolver_match.url_name == 'ip_list' %}active{% endif %}">Lista de IPs</a>
            <a href="{% url 'ip_create' %}" class="{% if request.resolver_match.url_name == 'ip_create' %}active{% endif %}">Nueva IP</a>
            <a href="{% url 'dashboard' %}" style="opacity: 0.8; margin-left: 20px;">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px; vertical-align: text-bottom;"></i> Volver a Inventario
            </a>
        </div>
    </nav>

    <main class="container animate-fade">
        {% if messages %}
            {% for message in messages %}
                <div class="card" style="margin-bottom: 1rem; border-left: 4px solid var(--primary)">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
