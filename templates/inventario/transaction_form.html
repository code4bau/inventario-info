{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h1 style="margin-bottom: 2rem;">Registrar Movimiento</h1>
    
    <div class="card">
        <form method="post">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="form-group" {% if field.name == 'responsable_otro' %}id="div_id_responsable_otro" style="display: none;"{% endif %}>
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p style="color: var(--accent); font-size: 0.8rem; margin-top: 0.25rem;">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            
            <div class="form-group" id="signature-container" style="margin-top: 1.5rem;">
                <label>Firma Digital</label>
                <div style="border: 2px dashed var(--border); border-radius: 8px; background: #fff; position: relative;">
                    <canvas id="signature-pad" width="560" height="200" style="width: 100%; cursor: crosshair; touch-action: none;"></canvas>
                    <button type="button" id="clear-signature" class="btn" style="position: absolute; top: 10px; right: 10px; padding: 0.4rem 0.8rem; font-size: 0.75rem; background: #fee2e2; color: #991b1b;">
                        Limpiar
                    </button>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem;">Firme en el recuadro superior</p>
            </div>

            <div class="flex-group" style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" id="btn-submit">
                    Confirmar Registro
                </button>
                <a href="{% url 'dashboard' %}" class="btn" style="background: #f1f5f9; color: var(--text);">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. Manejo de Item desde URL
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('item');
        if (itemId) {
            const select = document.getElementById('id_item');
            if (select) select.value = itemId;
        }

        // 2. Lógica de Firma Digital
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clear-signature');
        const firmaInput = document.getElementById('id_firma');
        const form = document.querySelector('form');
        
        let drawing = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            if (e.touches && e.touches[0]) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            e.preventDefault();
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            e.preventDefault();
        }

        function stopDrawing() {
            drawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            firmaInput.value = '';
        });

        // 3. Toggle Responsable Otro
        const personaSelect = document.getElementById('id_persona');
        const divResponsableOtro = document.getElementById('div_id_responsable_otro');
        const inputResponsableOtro = document.getElementById('id_responsable_otro');

        function toggleResponsableOtro() {
            if (personaSelect.value === "") {
                divResponsableOtro.style.display = 'block';
                inputResponsableOtro.required = true;
            } else {
                divResponsableOtro.style.display = 'none';
                inputResponsableOtro.required = false;
                inputResponsableOtro.value = '';
            }
        }

        if (personaSelect) {
            personaSelect.addEventListener('change', toggleResponsableOtro);
            toggleResponsableOtro(); // Run on load
        }

        form.addEventListener('submit', (e) => {
            // Solo guardar si el canvas no está vacío
            const blank = document.createElement('canvas');
            blank.width = canvas.width;
            blank.height = canvas.height;
            
            if (canvas.toDataURL() !== blank.toDataURL()) {
                firmaInput.value = canvas.toDataURL();
            }
        });
    });
</script>
{% endblock %}
